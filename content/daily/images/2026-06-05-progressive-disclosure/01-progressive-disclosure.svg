<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">渐进披露：先给路径，再给细节</title>
  <desc id="desc">一张解释性图示：左侧第一屏只保留主路径和关键选择，右侧在用户表达意图后展开次级设置与说明。</desc>
  <rect width="1200" height="760" fill="#f6f3ee"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Helvetica Neue',Arial,sans-serif" fill="#222">
    <text x="80" y="86" font-size="34" font-weight="650">把复杂留到第二步</text>
    <text x="80" y="124" font-size="18" fill="#6d675f">第一屏不是展示全部能力，而是保护下一步判断。</text>

    <g transform="translate(80 180)">
      <rect x="0" y="0" width="450" height="470" rx="28" fill="#ffffff" stroke="#ded8cf"/>
      <text x="34" y="56" font-size="22" font-weight="650">第一屏：主路径可见</text>
      <text x="34" y="88" font-size="15" fill="#7a746d">只暴露足够开始行动的信息</text>

      <rect x="34" y="128" width="382" height="66" rx="16" fill="#242424"/>
      <text x="58" y="170" font-size="20" fill="#fff" font-weight="650">继续创建</text>
      <circle cx="382" cy="161" r="16" fill="#f6f3ee"/>
      <path d="M376 153 L386 161 L376 169" fill="none" stroke="#242424" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="34" y="226" width="382" height="54" rx="14" fill="#f8f6f2" stroke="#e8e1d7"/>
      <text x="58" y="260" font-size="17" fill="#46413c">模板</text>
      <text x="334" y="260" font-size="15" fill="#8a837b">推荐</text>

      <rect x="34" y="302" width="382" height="54" rx="14" fill="#f8f6f2" stroke="#e8e1d7"/>
      <text x="58" y="336" font-size="17" fill="#46413c">更多选项</text>
      <path d="M370 324 L382 336 L394 324" fill="none" stroke="#8a837b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <line x1="34" y1="400" x2="416" y2="400" stroke="#eee7df"/>
      <text x="34" y="438" font-size="15" fill="#8a837b">隐藏：高级规则、例外情况、危险操作</text>
    </g>

    <g transform="translate(670 180)">
      <rect x="0" y="0" width="450" height="470" rx="28" fill="#ffffff" stroke="#ded8cf"/>
      <text x="34" y="56" font-size="22" font-weight="650">第二步：意图出现后展开</text>
      <text x="34" y="88" font-size="15" fill="#7a746d">细节在需要时才承担视觉重量</text>

      <rect x="34" y="126" width="382" height="54" rx="14" fill="#f8f6f2" stroke="#e8e1d7"/>
      <text x="58" y="160" font-size="17" fill="#46413c">创建方式：从模板开始</text>

      <rect x="34" y="204" width="382" height="78" rx="16" fill="#fffaf2" stroke="#e4c884"/>
      <text x="58" y="238" font-size="17" font-weight="650" fill="#46413c">高级规则</text>
      <text x="58" y="263" font-size="14" fill="#7a746d">仅当选择模板后才需要判断</text>

      <rect x="34" y="306" width="382" height="54" rx="14" fill="#f8f6f2" stroke="#e8e1d7"/>
      <text x="58" y="340" font-size="17" fill="#46413c">例外情况</text>

      <rect x="34" y="382" width="382" height="54" rx="14" fill="#f8f6f2" stroke="#e8e1d7"/>
      <text x="58" y="416" font-size="17" fill="#46413c">撤销与恢复</text>
    </g>

    <path d="M555 415 C595 415 615 415 645 415" fill="none" stroke="#b8ada2" stroke-width="3" stroke-linecap="round"/>
    <path d="M632 402 L646 415 L632 428" fill="none" stroke="#b8ada2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="80" y="710" font-size="18" fill="#6d675f">原则：少不是目的；让用户先获得方向感，才是减少复杂度的意义。</text>
  </g>
</svg>
