<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">用距离表达关系的分组示意</title>
  <desc id="desc">左侧为等距排列，右侧用更近的标题、说明和动作形成信息组，用更大的间距分开不同组。</desc>
  <rect width="1200" height="720" fill="#f7f5ef"/>
  <text x="72" y="76" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="30" font-weight="650" fill="#222">让距离先说明关系</text>
  <text x="72" y="116" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" fill="#666">相近的对象会被自然读成一组；间距不是空白装饰，而是信息语法。</text>

  <g transform="translate(72 172)">
    <rect x="0" y="0" width="490" height="452" rx="28" fill="#fff" stroke="#ddd6c8"/>
    <text x="34" y="54" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="22" font-weight="650" fill="#333">弱分组：所有距离都相似</text>
    <text x="34" y="84" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" fill="#777">眼睛需要逐行猜测哪些内容属于同一件事</text>
    <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
      <rect x="34" y="126" width="422" height="54" rx="12" fill="#f3f3f3"/>
      <text x="58" y="160" font-size="18" fill="#333">账户安全</text>
      <rect x="34" y="194" width="422" height="54" rx="12" fill="#f3f3f3"/>
      <text x="58" y="228" font-size="16" fill="#666">管理登录方式和二次验证</text>
      <rect x="34" y="262" width="422" height="54" rx="12" fill="#f3f3f3"/>
      <text x="58" y="296" font-size="16" fill="#666">上次更新：今天</text>
      <rect x="34" y="330" width="422" height="54" rx="12" fill="#f3f3f3"/>
      <text x="58" y="364" font-size="16" fill="#666">修改设置</text>
    </g>
  </g>

  <g transform="translate(638 172)">
    <rect x="0" y="0" width="490" height="452" rx="28" fill="#fff" stroke="#ddd6c8"/>
    <text x="34" y="54" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="22" font-weight="650" fill="#333">强分组：近处成组，远处分隔</text>
    <text x="34" y="84" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="15" fill="#777">标题、说明、状态和动作先被读成一个完整对象</text>
    <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">
      <rect x="34" y="126" width="422" height="160" rx="18" fill="#f4f1ea" stroke="#e0d8ca"/>
      <text x="58" y="166" font-size="20" font-weight="650" fill="#333">账户安全</text>
      <text x="58" y="198" font-size="16" fill="#666">管理登录方式和二次验证</text>
      <text x="58" y="230" font-size="15" fill="#8a7f6e">上次更新：今天</text>
      <rect x="330" y="242" width="92" height="30" rx="15" fill="#222"/>
      <text x="352" y="263" font-size="14" fill="#fff">修改</text>

      <rect x="34" y="334" width="422" height="68" rx="18" fill="#f8f8f8" stroke="#e7e2d8"/>
      <text x="58" y="375" font-size="17" fill="#555">通知偏好</text>
    </g>
  </g>
</svg>
