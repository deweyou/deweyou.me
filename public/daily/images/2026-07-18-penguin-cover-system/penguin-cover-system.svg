<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Penguin paperback cover system explanatory diagram</title>
  <desc id="desc">An original explanatory diagram showing how a repeatable book-cover system can use bands, grid, typography, imprint and color coding to create trust at shelf scale.</desc>
  <rect width="1400" height="900" fill="#f6f1e8"/>
  <text x="90" y="92" font-family="Helvetica, Arial, sans-serif" font-size="42" fill="#1f1f1f" font-weight="700">把单本封面做成一套出版秩序</text>
  <text x="92" y="137" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#555">原创说明图：从“漂亮封面”转向“可重复、可识别、可维护的系统”</text>

  <g transform="translate(112,190)">
    <rect x="0" y="0" width="320" height="500" rx="6" fill="#fdfbf6" stroke="#222" stroke-width="3"/>
    <rect x="0" y="0" width="320" height="145" rx="6" fill="#e97827"/>
    <rect x="0" y="355" width="320" height="145" rx="6" fill="#e97827"/>
    <rect x="0" y="143" width="320" height="214" fill="#fbf8ef" stroke="#222" stroke-width="2"/>
    <text x="160" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#111" text-anchor="middle" font-weight="700">AUTHOR</text>
    <text x="160" y="233" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#111" text-anchor="middle" font-weight="700">TITLE</text>
    <ellipse cx="160" cy="425" rx="44" ry="56" fill="#111" opacity="0.9"/>
    <ellipse cx="160" cy="418" rx="22" ry="35" fill="#fbf8ef" opacity="0.95"/>
    <text x="160" y="538" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555" text-anchor="middle">三段式识别：作者 / 书名 / 品牌印记</text>
  </g>

  <g transform="translate(520,210)" font-family="Helvetica, Arial, sans-serif">
    <line x1="0" y1="0" x2="0" y2="455" stroke="#333" stroke-width="2" stroke-dasharray="6 8"/>
    <line x1="78" y1="0" x2="78" y2="455" stroke="#999" stroke-width="1" stroke-dasharray="4 8"/>
    <line x1="156" y1="0" x2="156" y2="455" stroke="#999" stroke-width="1" stroke-dasharray="4 8"/>
    <line x1="234" y1="0" x2="234" y2="455" stroke="#999" stroke-width="1" stroke-dasharray="4 8"/>
    <line x1="312" y1="0" x2="312" y2="455" stroke="#333" stroke-width="2" stroke-dasharray="6 8"/>
    <text x="0" y="-25" font-size="24" fill="#222" font-weight="700">系统不是限制创意，而是固定判断成本</text>

    <g transform="translate(380,10)">
      <circle cx="0" cy="0" r="9" fill="#e97827"/><text x="26" y="7" font-size="24" fill="#222">颜色先说明类别</text>
      <text x="26" y="38" font-size="18" fill="#666">读者在书架上先辨认系列，不必逐本解码。</text>
    </g>
    <g transform="translate(380,125)">
      <circle cx="0" cy="0" r="9" fill="#222"/><text x="26" y="7" font-size="24" fill="#222">网格固定关系</text>
      <text x="26" y="38" font-size="18" fill="#666">作者、书名、品牌各有稳定位置，变化发生在内容。</text>
    </g>
    <g transform="translate(380,240)">
      <circle cx="0" cy="0" r="9" fill="#777"/><text x="26" y="7" font-size="24" fill="#222">字体与留白保持声量</text>
      <text x="26" y="38" font-size="18" fill="#666">封面不抢戏，让书作为公共物品保持可信。</text>
    </g>
    <g transform="translate(380,355)">
      <circle cx="0" cy="0" r="9" fill="#111"/><text x="26" y="7" font-size="24" fill="#222">规则可被编辑部长期执行</text>
      <text x="26" y="38" font-size="18" fill="#666">真正的品牌感来自重复中的稳定差异。</text>
    </g>
  </g>

  <g transform="translate(92,770)" font-family="Helvetica, Arial, sans-serif" fill="#444">
    <text x="0" y="0" font-size="22" font-weight="700">迁移到界面设计：</text>
    <text x="170" y="0" font-size="22">把卡片、列表、导航、状态和危险动作做成稳定语法；不要让每个页面重新发明一套视觉说法。</text>
  </g>
</svg>
