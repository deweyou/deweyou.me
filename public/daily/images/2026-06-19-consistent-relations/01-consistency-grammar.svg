<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f7f4ee"/>
  <text x="120" y="105" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="42" fill="#202020" font-weight="600">一致性不是复制外观，而是复用关系语法</text>
  <text x="120" y="160" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" fill="#666">相同的状态 / 层级 / 动作，应在不同场景里保持可识别的形状。</text>

  <g transform="translate(120,240)">
    <rect x="0" y="0" width="560" height="450" rx="28" fill="#ffffff" stroke="#ddd6ca"/>
    <text x="40" y="62" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="30" fill="#222" font-weight="600">关系一致</text>
    <rect x="40" y="105" width="480" height="72" rx="16" fill="#1f6feb"/>
    <text x="72" y="151" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" fill="white">主要动作：实心、高对比</text>
    <rect x="40" y="205" width="480" height="72" rx="16" fill="#ffffff" stroke="#8c8c8c" stroke-width="2"/>
    <text x="72" y="251" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" fill="#222">次要动作：描边、低重量</text>
    <rect x="40" y="305" width="480" height="72" rx="16" fill="#fff4e5" stroke="#d97706" stroke-width="2"/>
    <text x="72" y="351" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" fill="#7c2d12">风险状态：暖色、原因明确</text>
  </g>

  <g transform="translate(920,240)">
    <rect x="0" y="0" width="560" height="450" rx="28" fill="#ffffff" stroke="#ddd6ca"/>
    <text x="40" y="62" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="30" fill="#222" font-weight="600">表面重复</text>
    <rect x="40" y="105" width="220" height="72" rx="36" fill="#1f6feb"/>
    <text x="78" y="151" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" fill="white">保存</text>
    <rect x="300" y="105" width="190" height="72" rx="8" fill="#1f6feb"/>
    <text x="338" y="151" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" fill="white">删除</text>
    <rect x="40" y="225" width="450" height="72" rx="18" fill="#1f6feb" opacity="0.16"/>
    <text x="72" y="271" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" fill="#1f2937">同一种蓝色，被迫承担不同含义</text>
    <path d="M70 350 C140 315, 225 390, 310 350 S450 330, 500 375" fill="none" stroke="#c2410c" stroke-width="4" stroke-linecap="round"/>
    <text x="72" y="410" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="22" fill="#7c2d12">用户需要重新判断，而不是自然识别。</text>
  </g>

  <text x="120" y="805" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="24" fill="#555">检验：把文字遮住后，仍能看出“主要 / 次要 / 危险 / 禁用 / 成功”的关系吗？</text>
</svg>
