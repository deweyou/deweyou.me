<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">One question per page structure</title>
  <desc id="desc">A quiet diagram comparing a dense paper-like form with a sequence of focused question pages.</desc>
  <rect width="1200" height="720" fill="#f7f3ea"/>
  <g transform="translate(90 85)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" fill="#1d1d1b" font-weight="600">把纸面表单拆成可判断的步骤</text>
    <text x="0" y="42" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#5f5a50">左边是一次性承载所有问题的页面；右边是一页只处理一个判断的流程。</text>
  </g>
  <g transform="translate(90 180)">
    <rect x="0" y="0" width="390" height="420" rx="18" fill="#ffffff" stroke="#cfc7b8" stroke-width="2"/>
    <text x="32" y="48" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="#3b372f" font-weight="600">纸面逻辑</text>
    <text x="32" y="82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#746d61">所有问题同时出现，用户要自己判断顺序与相关性。</text>
    <g fill="#e9e2d5" stroke="#cbc0ad">
      <rect x="32" y="120" width="326" height="34" rx="6"/>
      <rect x="32" y="172" width="326" height="34" rx="6"/>
      <rect x="32" y="224" width="326" height="34" rx="6"/>
      <rect x="32" y="276" width="326" height="34" rx="6"/>
      <rect x="32" y="328" width="326" height="34" rx="6"/>
    </g>
    <g fill="#8c8578" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">
      <text x="48" y="142">Question A</text>
      <text x="48" y="194">Question B</text>
      <text x="48" y="246">Question C</text>
      <text x="48" y="298">Question D</text>
      <text x="48" y="350">Question E</text>
    </g>
  </g>
  <path d="M535 390 C575 390 602 390 642 390" fill="none" stroke="#b0a693" stroke-width="3" stroke-linecap="round"/>
  <path d="M628 376 L646 390 L628 404" fill="none" stroke="#b0a693" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(685 180)">
    <text x="0" y="-18" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="#3b372f" font-weight="600">服务逻辑</text>
    <g>
      <rect x="0" y="0" width="330" height="106" rx="18" fill="#ffffff" stroke="#1d70b8" stroke-width="3"/>
      <text x="28" y="42" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#1d1d1b" font-weight="600">Where do you live?</text>
      <text x="28" y="72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#5f5a50">只处理当前判断</text>
    </g>
    <path d="M165 116 L165 152" stroke="#b0a693" stroke-width="2"/>
    <g transform="translate(0 162)">
      <rect x="0" y="0" width="330" height="106" rx="18" fill="#ffffff" stroke="#cfc7b8" stroke-width="2"/>
      <text x="28" y="42" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#1d1d1b" font-weight="600">Do you have a passport?</text>
      <text x="28" y="72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#5f5a50">答案决定是否继续 / 分支</text>
    </g>
    <path d="M165 278 L165 314" stroke="#b0a693" stroke-width="2"/>
    <g transform="translate(0 324)">
      <rect x="0" y="0" width="330" height="106" rx="18" fill="#ffffff" stroke="#cfc7b8" stroke-width="2"/>
      <text x="28" y="42" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#1d1d1b" font-weight="600">Check your answers</text>
      <text x="28" y="72" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#5f5a50">复查与修正回路</text>
    </g>
  </g>
  <text x="90" y="660" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#6e675d">原则：不是减少问题数量，而是减少每一刻需要同时承担的判断。</text>
</svg>
